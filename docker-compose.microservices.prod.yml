services:
  ###############################################################################
  # Redis
  ###############################################################################
  # redis:
  #   logging:
  #     driver: 'syslog'
  #     options:
  #       syslog-address: 'udp://localhost:$LOGSTASH_UDP_PORT'
  #       tag: '{{.Name}}/{{.ID}}'
  #     #   syslog-facility: 'daemon'
  #   depends_on:
  #     - kibana
  ###############################################################################
  # Mongo
  ###############################################################################
  # mongo:
  #   logging:
  #     driver: 'syslog'
  #     options:
  #       syslog-address: 'udp://localhost:$LOGSTASH_UDP_PORT'
  #       tag: '{{.Name}}/{{.ID}}'
  #     #   syslog-facility: 'daemon'
  #   depends_on:
  #     - kibana
  ###############################################################################
  # Redis & Mongo: data services that must auto-recover from crashes
  # in production. Without `restart: unless-stopped`, a transient OOM or
  # disk-full event leaves the entire stack in a failed state because
  # every app container depends on these two.
  ###############################################################################
  redis:
    restart: unless-stopped
  mongo:
    restart: unless-stopped
  ###############################################################################
  # Gateway
  ###############################################################################
  gateway:
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    deploy:
      resources:
        limits:
          memory: 500M
          cpus: '0.5'
  ###############################################################################
  # Authenticator
  ###############################################################################
  authenticator:
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    build:
      context: .
      dockerfile: services/authenticator/Dockerfile
    # logging:
    #   driver: syslog
