    #     syslog-address: 'udp://localhost:$LOGSTASH_UDP_PORT'
    #     tag: '{{.Name}}/{{.ID}}'
    # depends_on:
    #   - kibana
    deploy:
      resources:
        limits:
          memory: 500M
          cpus: '0.5'
